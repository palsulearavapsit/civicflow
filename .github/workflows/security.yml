name: 🔒 Security & Dependency Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC

jobs:
  # SEC-17: Dependency Scanning
  dependency-audit:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit (high severity)
        run: npm audit --audit-level=high
      - name: Check for known vulnerabilities with retire.js
        run: npx retire --severity high --exitwith 13 || true

  # TEST-20: Dependency Update Regression
  dependency-update-test:
    name: Dependency Update Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests (regression check)
        run: npm run test:unit

  # A11Y-21: WCAG 2.1 AAA Compliance Check
  accessibility-check:
    name: WCAG 2.1 Accessibility Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Build application
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true
      - name: Run accessibility E2E tests
        run: npx playwright test --project=a11y-chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload a11y report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report
          path: playwright-report/

  # EFF-11: Memory Leak Detection
  memory-leak-check:
    name: Memory Leak Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests with memory leak detection
        run: node --expose-gc --max-old-space-size=512 node_modules/.bin/vitest run --reporter=verbose 2>&1 | tee test-output.txt
      - name: Check for heap size warnings
        run: |
          if grep -i "heap out of memory\|FATAL ERROR" test-output.txt; then
            echo "Memory leak detected!"
            exit 1
          fi
          echo "No memory issues detected"

  # TEST-10: OWASP Security Testing
  owasp-check:
    name: OWASP Security Headers Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check security headers configuration
        run: |
          echo "Checking next.config.ts for required security headers..."
          grep -q "X-Frame-Options" next.config.ts && echo "✓ X-Frame-Options" || exit 1
          grep -q "Strict-Transport-Security" next.config.ts && echo "✓ HSTS" || exit 1
          grep -q "Permissions-Policy" next.config.ts && echo "✓ Permissions-Policy" || exit 1
          grep -q "X-Content-Type-Options" next.config.ts && echo "✓ X-Content-Type-Options" || exit 1
          echo "All required security headers are configured!"
